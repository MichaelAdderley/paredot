<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #151313;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
      text-transform: uppercase;
    }

    .app {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 56px 80px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
    }

    .header-date {
      font-size: 15px;
      font-weight: 400;
      color: #5c5c5c;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-actions button {
      background: none;
      border: none;
      cursor: pointer;
      color: #5c5c5c;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .header-actions button:hover {
      color: #999;
    }

    .header-actions svg {
      width: 20px;
      height: 20px;
    }

    /* Grid */
    .grid-container {
      flex: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      grid-template-rows: repeat(16, 1fr);
      width: calc(100% + 100% / 23);
      margin-left: calc(-100% / 23 / 2);
      height: 100%;
      max-height: 600px;
    }

    .grid-dot {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .grid-dot::after {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #3a3a3a;
      transition: background 0.2s;
    }

    .grid-dot.past::after {
      background: #ffffff;
    }

    .grid-dot.empty {
      pointer-events: none;
    }

    .grid-dot.empty::after {
      background: transparent;
    }

    .grid-dot:hover::after {
      background: #888;
    }

    .grid-dot.past:hover::after {
      background: #ccc;
    }

    .grid-dot.has-task::after {
      background: var(--accent, #4ade80);
    }

    .grid-dot.has-task:hover::after {
      filter: brightness(0.85);
      background: var(--accent, #4ade80);
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      width: 360px;
    }

    .modal h2 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 24px;
    }

    .modal-field {
      margin-bottom: 16px;
    }

    .modal-field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #5c5c5c;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .modal-field input {
      width: 100%;
      padding: 10px 14px;
      background: #151313;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      text-transform: none;
    }

    .modal-field input:focus {
      border-color: var(--accent, #4ade80);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .modal-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .btn-cancel {
      background: #2a2a2a;
      color: #999;
    }

    .btn-cancel:hover {
      background: #333;
    }

    .btn-add-task {
      background: var(--accent, #4ade80);
      color: #151313;
    }

    .btn-add-task:hover {
      filter: brightness(0.85);
    }

    .modal-field input.error {
      border-color: #ef4444;
    }

    .modal-field .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 6px;
    }

    .modal {
      position: relative;
    }

    .btn-delete {
      position: absolute;
      top: 28px;
      right: 28px;
      background: none;
      color: #ef4444;
      padding: 4px;
      cursor: pointer;
      border: none;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .btn-delete:hover {
      color: #dc2626;
      background: rgba(239, 68, 68, 0.1);
    }

    .btn-delete.visible {
      display: flex;
    }

    .btn-delete svg {
      width: 18px;
      height: 18px;
    }

    .grid-dot.has-task {
      cursor: pointer;
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: #000;
      color: #fff;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      padding: 6px 10px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 50;
      white-space: nowrap;
      line-height: 1.4;
    }

    .tooltip.visible {
      opacity: 1;
    }

    .tooltip .tooltip-task {
      color: #999;
      font-size: 12px;
      display: block;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Settings panel */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .settings-overlay.open {
      display: flex;
    }

    .settings-panel {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      width: 360px;
    }

    .settings-panel h2 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 24px;
    }

    .settings-label {
      font-size: 13px;
      font-weight: 500;
      color: #5c5c5c;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .color-options {
      display: flex;
      gap: 12px;
    }

    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }

    .color-swatch:hover {
      transform: scale(1.1);
    }

    .color-swatch.selected {
      border-color: #fff;
    }

    .settings-done {
      margin-top: 24px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: var(--accent, #4ade80);
      color: #151313;
      transition: background 0.2s, opacity 0.2s;
    }

    .settings-done:hover:not(:disabled) {
      filter: brightness(0.85);
    }

    .settings-done:disabled {
      background: #2a2a2a;
      color: #555;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-left">
        <span class="header-title">Project friendship</span>
        <span class="header-date" id="today-date"></span>
      </div>
      <div class="header-actions">
        <button id="btn-add" aria-label="Add task">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 12h8"/>
            <path d="M12 8v8"/>
          </svg>
        </button>
        <button id="btn-settings" aria-label="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="grid-container">
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Settings Panel -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel">
      <h2>Settings</h2>
      <div class="modal-field">
        <label>Board title</label>
        <input type="text" id="settings-board-title" placeholder="Enter a title">
      </div>
      <p class="settings-label">Task dot color</p>
      <div class="color-options" id="color-options"></div>
      <button class="settings-done" id="settings-done">Done</button>
    </div>
  </div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Add Task</h2>
      <div class="modal-field">
        <label>Title</label>
        <input type="text" id="task-title" placeholder="What needs to be done?">
      </div>
      <div class="modal-field">
        <label>Date</label>
        <input type="date" id="task-date">
      </div>
      <button class="btn-delete" id="btn-delete" aria-label="Delete task">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"/>
          <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
          <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
          <line x1="10" y1="11" x2="10" y2="17"/>
          <line x1="14" y1="11" x2="14" y2="17"/>
        </svg>
      </button>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
        <button class="btn-add-task" id="btn-save">Add</button>
      </div>
    </div>
  </div>

  <script>
    // Set today's date
    const today = new Date();
    document.getElementById('today-date').textContent = 'Today is ' + today.toLocaleDateString('en-US', {
      month: 'long', day: 'numeric', year: 'numeric'
    });

    // Generate 24x16 grid representing the calendar year
    const grid = document.getElementById('grid');
    const year = today.getFullYear();
    const startOfYear = new Date(year, 0, 1);
    const daysInYear = ((year % 4 === 0 && year % 100 !== 0) || year % 400 === 0) ? 366 : 365;
    const dayOfYear = Math.floor((today - startOfYear) / (1000 * 60 * 60 * 24)) + 1;
    const totalCells = 24 * 16;

    // Load tasks from localStorage
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

    // Get set of day indices that have tasks
    function getTaskDays() {
      const taskDays = new Set();
      tasks.forEach(task => {
        const taskDate = new Date(task.date + 'T00:00:00');
        if (taskDate.getFullYear() === year) {
          const dayIndex = Math.floor((taskDate - startOfYear) / (1000 * 60 * 60 * 24));
          taskDays.add(dayIndex);
        }
      });
      return taskDays;
    }

    // Build a map of dayIndex -> array of task indices for click lookups
    function getTaskDayMap() {
      const map = {};
      tasks.forEach((task, idx) => {
        const taskDate = new Date(task.date + 'T00:00:00');
        if (taskDate.getFullYear() === year) {
          const dayIndex = Math.floor((taskDate - startOfYear) / (1000 * 60 * 60 * 24));
          if (!map[dayIndex]) map[dayIndex] = [];
          map[dayIndex].push(idx);
        }
      });
      return map;
    }

    function renderGrid() {
      grid.innerHTML = '';
      const taskDays = getTaskDays();
      for (let i = 0; i < totalCells; i++) {
        const dot = document.createElement('div');
        dot.className = 'grid-dot';
        if (i >= daysInYear) {
          dot.classList.add('empty');
        } else {
          dot.dataset.dayIndex = i;
          if (taskDays.has(i)) {
            dot.classList.add('has-task');
          } else if (i < dayOfYear) {
            dot.classList.add('past');
          }
        }
        grid.appendChild(dot);
      }
    }

    renderGrid();

    // Tooltip logic
    const tooltip = document.getElementById('tooltip');

    function formatDayIndex(dayIndex) {
      const date = new Date(year, 0, dayIndex + 1);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function getTaskForDay(dayIndex) {
      const taskDayMap = getTaskDayMap();
      const taskIndices = taskDayMap[dayIndex];
      if (taskIndices && taskIndices.length > 0) {
        return tasks[taskIndices[0]].title;
      }
      return null;
    }

    grid.addEventListener('mouseover', (e) => {
      const dot = e.target.closest('.grid-dot:not(.empty)');
      if (!dot || dot.dataset.dayIndex == null) {
        tooltip.classList.remove('visible');
        return;
      }
      const dayIndex = parseInt(dot.dataset.dayIndex);
      const dateLabel = formatDayIndex(dayIndex);
      const taskTitle = getTaskForDay(dayIndex);

      if (taskTitle) {
        tooltip.innerHTML = `${dateLabel}<span class="tooltip-task">${taskTitle}</span>`;
      } else {
        tooltip.textContent = dateLabel;
      }
      tooltip.classList.add('visible');
    });

    grid.addEventListener('mousemove', (e) => {
      tooltip.style.left = e.clientX + 12 + 'px';
      tooltip.style.top = e.clientY - 12 + 'px';
    });

    grid.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });

    // Modal logic
    const modalOverlay = document.getElementById('modal-overlay');
    const modalTitleEl = document.getElementById('modal-title');
    const taskTitleInput = document.getElementById('task-title');
    const taskDateInput = document.getElementById('task-date');
    const btnSave = document.getElementById('btn-save');
    const btnCancel = document.getElementById('btn-cancel');
    const btnDelete = document.getElementById('btn-delete');

    const MAX_TASKS = 4;
    let editingTaskIndex = null;
    let toastTimeout = null;

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('visible');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('visible'), 3000);
    }

    function openModal(mode, taskIndex) {
      if (mode === 'edit' && taskIndex != null) {
        editingTaskIndex = taskIndex;
        modalTitleEl.textContent = 'Edit Task';
        btnSave.textContent = 'Save';
        taskTitleInput.value = tasks[taskIndex].title;
        taskDateInput.value = tasks[taskIndex].date;
        btnDelete.classList.add('visible');
      } else {
        editingTaskIndex = null;
        modalTitleEl.textContent = 'Add Task';
        btnSave.textContent = 'Add';
        taskTitleInput.value = '';
        taskDateInput.value = today.toISOString().split('T')[0];
        btnDelete.classList.remove('visible');
      }
      modalOverlay.classList.add('open');
      taskTitleInput.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      editingTaskIndex = null;
    }

    document.getElementById('btn-add').addEventListener('click', () => {
      if (tasks.length >= MAX_TASKS) {
        showToast(`Task limit reached — you can only have ${MAX_TASKS} tasks`);
        return;
      }
      openModal('add');
    });

    // Click green dots to edit
    grid.addEventListener('click', (e) => {
      const dot = e.target.closest('.grid-dot.has-task');
      if (!dot) return;
      const dayIndex = parseInt(dot.dataset.dayIndex);
      const taskDayMap = getTaskDayMap();
      const taskIndices = taskDayMap[dayIndex];
      if (taskIndices && taskIndices.length > 0) {
        openModal('edit', taskIndices[0]);
      }
    });

    btnCancel.addEventListener('click', closeModal);

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    function clearErrors() {
      taskTitleInput.classList.remove('error');
      taskDateInput.classList.remove('error');
      document.querySelectorAll('.modal .error-msg').forEach(el => el.remove());
    }

    function showError(input, message) {
      input.classList.add('error');
      const msg = document.createElement('div');
      msg.className = 'error-msg';
      msg.textContent = message;
      input.parentElement.appendChild(msg);
    }

    taskTitleInput.addEventListener('input', clearErrors);
    taskDateInput.addEventListener('input', clearErrors);

    btnSave.addEventListener('click', () => {
      clearErrors();
      const title = taskTitleInput.value.trim();
      const date = taskDateInput.value;
      let hasError = false;

      if (!title) {
        showError(taskTitleInput, 'Please enter a title');
        hasError = true;
      }
      if (!date) {
        showError(taskDateInput, 'Please enter a valid date');
        hasError = true;
      }
      if (hasError) return;

      if (editingTaskIndex != null) {
        tasks[editingTaskIndex] = { title, date };
      } else {
        tasks.push({ title, date });
      }
      localStorage.setItem('tasks', JSON.stringify(tasks));
      renderGrid();
      closeModal();
    });

    btnDelete.addEventListener('click', () => {
      if (editingTaskIndex != null) {
        tasks.splice(editingTaskIndex, 1);
        localStorage.setItem('tasks', JSON.stringify(tasks));
        renderGrid();
        closeModal();
      }
    });

    taskTitleInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnSave.click();
    });

    // Settings logic
    const headerTitleEl = document.querySelector('.header-title');
    const settingsBoardTitle = document.getElementById('settings-board-title');
    const settingsOverlay = document.getElementById('settings-overlay');
    const colorOptions = document.getElementById('color-options');
    const settingsDone = document.getElementById('settings-done');

    let boardTitle = localStorage.getItem('boardTitle') || 'Project friendship';
    headerTitleEl.textContent = boardTitle;

    const accentColors = [
      { name: 'Green',  value: '#4ade80' },
      { name: 'Blue',   value: '#60a5fa' },
      { name: 'Purple', value: '#c084fc' },
      { name: 'Amber',  value: '#fbbf24' },
      { name: 'Rose',   value: '#fb7185' },
      { name: 'Cyan',   value: '#22d3ee' },
    ];

    let currentAccent = localStorage.getItem('accentColor') || '#4ade80';
    document.documentElement.style.setProperty('--accent', currentAccent);

    // Pending settings state (not yet saved)
    let pendingAccent = null;
    let pendingTitle = null;

    function hasSettingsChanged() {
      const titleChanged = settingsBoardTitle.value.trim() !== boardTitle;
      const colorChanged = pendingAccent !== null && pendingAccent !== currentAccent;
      return titleChanged || colorChanged;
    }

    function updateDoneButton() {
      settingsDone.disabled = !hasSettingsChanged();
    }

    function renderColorOptions() {
      colorOptions.innerHTML = '';
      const displayAccent = pendingAccent || currentAccent;
      accentColors.forEach(c => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch' + (c.value === displayAccent ? ' selected' : '');
        swatch.style.background = c.value;
        swatch.title = c.name;
        swatch.addEventListener('click', () => {
          pendingAccent = c.value;
          renderColorOptions();
          updateDoneButton();
        });
        colorOptions.appendChild(swatch);
      });
    }

    function openSettings() {
      pendingAccent = null;
      pendingTitle = null;
      settingsBoardTitle.value = boardTitle;
      renderColorOptions();
      settingsDone.disabled = true;
      settingsOverlay.classList.add('open');
    }

    function closeSettings() {
      settingsOverlay.classList.remove('open');
      pendingAccent = null;
      pendingTitle = null;
    }

    document.getElementById('btn-settings').addEventListener('click', openSettings);

    settingsBoardTitle.addEventListener('input', updateDoneButton);

    settingsDone.addEventListener('click', () => {
      if (settingsDone.disabled) return;

      // Save title
      const newTitle = settingsBoardTitle.value.trim();
      if (newTitle && newTitle !== boardTitle) {
        boardTitle = newTitle;
        localStorage.setItem('boardTitle', boardTitle);
        headerTitleEl.textContent = boardTitle;
      }

      // Save color
      if (pendingAccent && pendingAccent !== currentAccent) {
        currentAccent = pendingAccent;
        localStorage.setItem('accentColor', currentAccent);
        document.documentElement.style.setProperty('--accent', currentAccent);
      }

      closeSettings();
    });

    settingsOverlay.addEventListener('click', (e) => {
      if (e.target === settingsOverlay) closeSettings();
    });
  </script>
</body>
</html>
