<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paredot</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #151313;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
      text-transform: uppercase;
    }

    .app {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 56px 80px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
    }

    .header-date {
      font-size: 15px;
      font-weight: 400;
      color: #5c5c5c;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-actions button {
      background: none;
      border: none;
      cursor: pointer;
      color: #5c5c5c;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .header-actions button:hover {
      color: #999;
    }

    .header-actions svg {
      width: 20px;
      height: 20px;
    }

    /* Grid */
    .grid-container {
      flex: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      grid-template-rows: repeat(16, 1fr);
      width: calc(100% + 100% / 23);
      margin-left: calc(-100% / 23 / 2);
      height: 100%;
      max-height: 600px;
    }

    .grid-dot {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .grid-dot::after {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #3a3a3a;
      transition: background 0.2s;
    }

    .grid-dot.past::after {
      background: #ffffff;
    }

    .grid-dot.empty {
      pointer-events: none;
    }

    .grid-dot.empty::after {
      background: transparent;
    }

    .grid-dot:hover::after {
      background: #888;
    }

    .grid-dot.past:hover::after {
      background: #ccc;
    }

    .grid-dot.has-milestone::after {
      background: var(--accent, #4ade80);
    }

    .grid-dot.has-milestone:hover::after {
      filter: brightness(0.85);
      background: var(--accent, #4ade80);
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 36px;
      width: 440px;
    }

    .modal h2 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 24px;
    }

    .modal-field {
      margin-bottom: 16px;
    }

    .modal-field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #5c5c5c;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .modal-field input {
      width: 100%;
      padding: 12px 16px;
      background: #151313;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      text-transform: none;
    }

    .modal-field input:focus {
      border-color: var(--accent, #4ade80);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .modal-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .btn-cancel {
      background: #2a2a2a;
      color: #999;
    }

    .btn-cancel:hover {
      background: #333;
    }

    .btn-add-milestone {
      background: var(--accent, #4ade80);
      color: #151313;
    }

    .btn-add-milestone:hover {
      filter: brightness(0.85);
    }

    .modal-field input.error {
      border-color: #ef4444;
    }

    .modal-field .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 6px;
    }

    /* Calendar */
    .calendar {
      width: 100%;
      background: #151313;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 18px;
      transition: border-color 0.2s;
    }

    .calendar.error {
      border-color: #ef4444;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .calendar-title {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .cal-nav {
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      color: #5c5c5c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 0;
      transition: color 0.2s, background 0.2s;
    }

    .cal-nav:hover {
      color: #fff;
      background: #2a2a2a;
    }

    .cal-nav svg {
      width: 16px;
      height: 16px;
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 6px;
    }

    .calendar-weekdays span {
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      color: #5c5c5c;
      letter-spacing: 0.5px;
      padding: 6px 0;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-family: inherit;
      font-weight: 400;
      background: none;
      border: 1px solid transparent;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      padding: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .cal-day:hover:not(.cal-day-selected) {
      background: #2a2a2a;
    }

    .cal-day.cal-day-other-month {
      color: #3a3a3a;
    }

    .cal-day.cal-day-today {
      border-color: var(--accent, #4ade80);
    }

    .cal-day.cal-day-selected {
      background: var(--accent, #4ade80);
      color: #151313;
      font-weight: 500;
      border-color: var(--accent, #4ade80);
    }

    .cal-day.cal-day-selected:hover {
      filter: brightness(0.9);
    }

    .cal-day.cal-day-disabled {
      color: #2a2a2a;
      cursor: not-allowed;
    }

    .cal-day.cal-day-disabled:hover {
      background: none;
    }

    /* Settings calendar (compact) */
    .calendar.calendar-compact {
      padding: 12px;
    }

    .calendar.calendar-compact .calendar-header {
      margin-bottom: 8px;
    }

    .calendar.calendar-compact .calendar-title {
      font-size: 12px;
    }

    .calendar.calendar-compact .calendar-weekdays span {
      font-size: 10px;
      padding: 4px 0;
    }

    .calendar.calendar-compact .cal-day {
      font-size: 12px;
    }

    .calendar.calendar-compact .cal-nav {
      width: 24px;
      height: 24px;
    }

    .calendar.calendar-compact .cal-nav svg {
      width: 14px;
      height: 14px;
    }

    .modal {
      position: relative;
    }

    .btn-delete {
      position: absolute;
      top: 28px;
      right: 28px;
      background: none;
      color: #ef4444;
      padding: 4px;
      cursor: pointer;
      border: none;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .btn-delete:hover {
      color: #dc2626;
      background: rgba(239, 68, 68, 0.1);
    }

    .btn-delete.visible {
      display: flex;
    }

    .btn-delete svg {
      width: 18px;
      height: 18px;
    }

    .grid-dot.has-milestone {
      cursor: pointer;
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: #000;
      color: #fff;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      padding: 6px 10px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 50;
      white-space: nowrap;
      line-height: 1.4;
    }

    .tooltip.visible {
      opacity: 1;
    }

    .tooltip .tooltip-milestone {
      color: #999;
      font-size: 12px;
      display: block;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Settings panel */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      overflow-y: auto;
      padding: 32px 0;
    }

    .settings-overlay.open {
      display: flex;
    }

    .settings-panel {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      width: 360px;
      margin: auto;
    }

    .settings-panel h2 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 24px;
    }

    .settings-label {
      font-size: 13px;
      font-weight: 500;
      color: #5c5c5c;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .color-options {
      display: flex;
      gap: 12px;
    }

    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }

    .color-swatch:hover {
      transform: scale(1.1);
    }

    .color-swatch.selected {
      border-color: #fff;
    }

    .settings-done {
      margin-top: 24px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: var(--accent, #4ade80);
      color: #151313;
      transition: background 0.2s, opacity 0.2s;
    }

    .settings-done:hover:not(:disabled) {
      filter: brightness(0.85);
    }

    .settings-done:disabled {
      background: #2a2a2a;
      color: #555;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-left">
        <span class="header-title">Project friendship</span>
        <span class="header-date" id="today-date"></span>
      </div>
      <div class="header-actions">
        <button id="btn-add" aria-label="Add milestone">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 12h8"/>
            <path d="M12 8v8"/>
          </svg>
        </button>
        <button id="btn-settings" aria-label="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="grid-container">
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Settings Panel -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel">
      <h2>Settings</h2>
      <div class="modal-field">
        <label>Board title</label>
        <input type="text" id="settings-board-title" placeholder="Enter a title">
      </div>
      <p class="settings-label">Year start date</p>
      <div class="calendar calendar-compact" id="settings-calendar">
        <div class="calendar-header">
          <button type="button" class="cal-nav" id="settings-cal-prev" aria-label="Previous month">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <span class="calendar-title" id="settings-calendar-title"></span>
          <button type="button" class="cal-nav" id="settings-cal-next" aria-label="Next month">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>
        <div class="calendar-weekdays">
          <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
        </div>
        <div class="calendar-days" id="settings-calendar-days"></div>
      </div>
      <p class="settings-label" style="margin-top: 24px;">Milestone dot color</p>
      <div class="color-options" id="color-options"></div>
      <button class="settings-done" id="settings-done">Done</button>
    </div>
  </div>

  <!-- Milestone Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Add Milestone</h2>
      <div class="modal-field">
        <input type="text" id="milestone-title" placeholder="e.g. birthday, vacation, concert...">
      </div>
      <div class="modal-field">
        <div class="calendar" id="calendar">
          <div class="calendar-header">
            <button type="button" class="cal-nav" id="cal-prev" aria-label="Previous month">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>
            <span class="calendar-title" id="calendar-title"></span>
            <button type="button" class="cal-nav" id="cal-next" aria-label="Next month">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </button>
          </div>
          <div class="calendar-weekdays">
            <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
          </div>
          <div class="calendar-days" id="calendar-days"></div>
        </div>
      </div>
      <button class="btn-delete" id="btn-delete" aria-label="Delete milestone">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"/>
          <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
          <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
          <line x1="10" y1="11" x2="10" y2="17"/>
          <line x1="14" y1="11" x2="14" y2="17"/>
        </svg>
      </button>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
        <button class="btn-add-milestone" id="btn-save">Add</button>
      </div>
    </div>
  </div>

  <script>
    // Today (date will be set after we compute the year range)
    const today = new Date();
    const headerDateEl = document.getElementById('today-date');

    function updateHeaderDate() {
      const opts = { month: 'long', day: 'numeric', year: 'numeric' };
      const lastDay = new Date(endDate.getTime() - DAY_MS);
      const startStr = startDate.toLocaleDateString('en-US', opts);
      const endStr = lastDay.toLocaleDateString('en-US', opts);
      headerDateEl.textContent = `${startStr} - ${endStr}`;
    }

    // Date helpers
    const DAY_MS = 1000 * 60 * 60 * 24;

    function formatDateString(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function parseDateString(str) {
      return new Date(str + 'T00:00:00');
    }

    // Migrate legacy localStorage key (pre-rename) to 'milestones' for existing users
    const LEGACY_KEY = 'ta' + 'sks';
    if (localStorage.getItem(LEGACY_KEY) !== null && localStorage.getItem('milestones') === null) {
      localStorage.setItem('milestones', localStorage.getItem(LEGACY_KEY));
      localStorage.removeItem(LEGACY_KEY);
    }

    // Generate 24x16 grid representing a 365-day year
    const grid = document.getElementById('grid');
    const daysInYear = 365;
    const totalCells = 24 * 16;

    // Year window state (configurable start date)
    let startDateStr = localStorage.getItem('startDate')
      || formatDateString(new Date(today.getFullYear(), 0, 1));
    let startDate, endDate, daysFromStartToToday;

    function recomputeYearWindow() {
      startDate = parseDateString(startDateStr);
      endDate = new Date(startDate.getTime() + daysInYear * DAY_MS);
      daysFromStartToToday = Math.floor((today - startDate) / DAY_MS);
    }
    recomputeYearWindow();
    updateHeaderDate();

    function dayIndexForDate(dateStr) {
      const d = parseDateString(dateStr);
      return Math.floor((d - startDate) / DAY_MS);
    }

    function dateForDayIndex(dayIndex) {
      return new Date(startDate.getTime() + dayIndex * DAY_MS);
    }

    // Load milestones from localStorage
    let milestones = JSON.parse(localStorage.getItem('milestones') || '[]');

    // Get set of day indices that have milestones (within the year window)
    function getMilestoneDays() {
      const milestoneDays = new Set();
      milestones.forEach(milestone => {
        const idx = dayIndexForDate(milestone.date);
        if (idx >= 0 && idx < daysInYear) milestoneDays.add(idx);
      });
      return milestoneDays;
    }

    // Build a map of dayIndex -> array of milestone indices for click lookups
    function getMilestoneDayMap() {
      const map = {};
      milestones.forEach((milestone, idx) => {
        const dayIdx = dayIndexForDate(milestone.date);
        if (dayIdx >= 0 && dayIdx < daysInYear) {
          if (!map[dayIdx]) map[dayIdx] = [];
          map[dayIdx].push(idx);
        }
      });
      return map;
    }

    function renderGrid() {
      grid.innerHTML = '';
      const milestoneDays = getMilestoneDays();
      for (let i = 0; i < totalCells; i++) {
        const dot = document.createElement('div');
        dot.className = 'grid-dot';
        if (i >= daysInYear) {
          dot.classList.add('empty');
        } else {
          dot.dataset.dayIndex = i;
          if (milestoneDays.has(i)) {
            dot.classList.add('has-milestone');
          } else if (i < daysFromStartToToday) {
            dot.classList.add('past');
          }
        }
        grid.appendChild(dot);
      }
    }

    renderGrid();

    // Tooltip logic
    const tooltip = document.getElementById('tooltip');

    function formatDayIndex(dayIndex) {
      const date = dateForDayIndex(dayIndex);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function getMilestoneForDay(dayIndex) {
      const milestoneDayMap = getMilestoneDayMap();
      const milestoneIndices = milestoneDayMap[dayIndex];
      if (milestoneIndices && milestoneIndices.length > 0) {
        return milestones[milestoneIndices[0]].title;
      }
      return null;
    }

    grid.addEventListener('mouseover', (e) => {
      const dot = e.target.closest('.grid-dot:not(.empty)');
      if (!dot || dot.dataset.dayIndex == null) {
        tooltip.classList.remove('visible');
        return;
      }
      const dayIndex = parseInt(dot.dataset.dayIndex);
      const dateLabel = formatDayIndex(dayIndex);
      const milestoneTitle = getMilestoneForDay(dayIndex);

      if (milestoneTitle) {
        tooltip.innerHTML = `${dateLabel}<span class="tooltip-milestone">${milestoneTitle}</span>`;
      } else {
        tooltip.textContent = dateLabel;
      }
      tooltip.classList.add('visible');
    });

    grid.addEventListener('mousemove', (e) => {
      tooltip.style.left = e.clientX + 12 + 'px';
      tooltip.style.top = e.clientY - 12 + 'px';
    });

    grid.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });

    // Modal logic
    const modalOverlay = document.getElementById('modal-overlay');
    const modalTitleEl = document.getElementById('modal-title');
    const milestoneTitleInput = document.getElementById('milestone-title');
    const btnSave = document.getElementById('btn-save');
    const btnCancel = document.getElementById('btn-cancel');
    const btnDelete = document.getElementById('btn-delete');

    // Reusable calendar factory
    function makeCalendar(opts) {
      // opts: { rootEl, daysEl, titleEl, prevBtn, nextBtn, getSelectedDate,
      //        setSelectedDate, getMinDate, getMaxDate }
      let viewYear = today.getFullYear();
      let viewMonth = today.getMonth();

      function setView(date) {
        viewYear = date.getFullYear();
        viewMonth = date.getMonth();
      }

      function navigate(delta) {
        viewMonth += delta;
        if (viewMonth < 0) { viewMonth = 11; viewYear--; }
        else if (viewMonth > 11) { viewMonth = 0; viewYear++; }
        render();
      }

      function render() {
        const monthStart = new Date(viewYear, viewMonth, 1);
        const startDayOfWeek = monthStart.getDay();
        const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
        const daysInPrevMonth = new Date(viewYear, viewMonth, 0).getDate();
        const todayStr = formatDateString(today);
        const selected = opts.getSelectedDate();
        const minDate = opts.getMinDate ? opts.getMinDate() : null;
        const maxDate = opts.getMaxDate ? opts.getMaxDate() : null;

        opts.titleEl.textContent = monthStart.toLocaleDateString('en-US', {
          month: 'long', year: 'numeric'
        });

        opts.daysEl.innerHTML = '';
        for (let i = 0; i < 42; i++) {
          const dayBtn = document.createElement('button');
          dayBtn.type = 'button';
          dayBtn.className = 'cal-day';

          let dayNumber, dayDate;
          if (i < startDayOfWeek) {
            dayNumber = daysInPrevMonth - startDayOfWeek + i + 1;
            dayDate = new Date(viewYear, viewMonth - 1, dayNumber);
            dayBtn.classList.add('cal-day-other-month');
          } else if (i >= startDayOfWeek + daysInMonth) {
            dayNumber = i - startDayOfWeek - daysInMonth + 1;
            dayDate = new Date(viewYear, viewMonth + 1, dayNumber);
            dayBtn.classList.add('cal-day-other-month');
          } else {
            dayNumber = i - startDayOfWeek + 1;
            dayDate = new Date(viewYear, viewMonth, dayNumber);
          }

          const dateStr = formatDateString(dayDate);
          dayBtn.dataset.date = dateStr;
          dayBtn.textContent = dayNumber;

          if (dateStr === todayStr) dayBtn.classList.add('cal-day-today');
          if (dateStr === selected) dayBtn.classList.add('cal-day-selected');
          if ((minDate && dayDate < minDate) || (maxDate && dayDate >= maxDate)) {
            dayBtn.classList.add('cal-day-disabled');
          }

          opts.daysEl.appendChild(dayBtn);
        }
      }

      opts.daysEl.addEventListener('click', (e) => {
        const btn = e.target.closest('.cal-day');
        if (!btn || btn.classList.contains('cal-day-disabled')) return;
        opts.setSelectedDate(btn.dataset.date);
        setView(parseDateString(btn.dataset.date));
        opts.rootEl.classList.remove('error');
        const errMsg = opts.rootEl.parentElement.querySelector('.error-msg');
        if (errMsg) errMsg.remove();
        render();
      });

      opts.prevBtn.addEventListener('click', () => navigate(-1));
      opts.nextBtn.addEventListener('click', () => navigate(1));

      return {
        focusDate(dateStr) {
          setView(parseDateString(dateStr));
          render();
        },
        render
      };
    }

    // Milestone modal calendar
    const calendarEl = document.getElementById('calendar');
    let selectedDate = formatDateString(today);
    const milestoneCalendar = makeCalendar({
      rootEl: calendarEl,
      daysEl: document.getElementById('calendar-days'),
      titleEl: document.getElementById('calendar-title'),
      prevBtn: document.getElementById('cal-prev'),
      nextBtn: document.getElementById('cal-next'),
      getSelectedDate: () => selectedDate,
      setSelectedDate: (d) => { selectedDate = d; },
      getMinDate: () => startDate,
      getMaxDate: () => endDate
    });

    const MAX_MILESTONES = 4;
    let editingMilestoneIndex = null;
    let toastTimeout = null;

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('visible');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('visible'), 3000);
    }

    function clampDateToYear(dateStr) {
      const d = parseDateString(dateStr);
      if (d < startDate) return formatDateString(startDate);
      const lastDay = new Date(endDate.getTime() - DAY_MS);
      if (d >= endDate) return formatDateString(lastDay);
      return dateStr;
    }

    function openModal(mode, milestoneIndex) {
      if (mode === 'edit' && milestoneIndex != null) {
        editingMilestoneIndex = milestoneIndex;
        modalTitleEl.textContent = 'Edit Milestone';
        btnSave.textContent = 'Save';
        milestoneTitleInput.value = milestones[milestoneIndex].title;
        selectedDate = milestones[milestoneIndex].date;
        btnDelete.classList.add('visible');
      } else {
        editingMilestoneIndex = null;
        modalTitleEl.textContent = 'Add Milestone';
        btnSave.textContent = 'Add';
        milestoneTitleInput.value = '';
        selectedDate = clampDateToYear(formatDateString(today));
        btnDelete.classList.remove('visible');
      }
      milestoneCalendar.focusDate(selectedDate);
      modalOverlay.classList.add('open');
      milestoneTitleInput.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      editingMilestoneIndex = null;
    }

    document.getElementById('btn-add').addEventListener('click', () => {
      if (milestones.length >= MAX_MILESTONES) {
        showToast(`Milestone limit reached — you can only have ${MAX_MILESTONES} milestones`);
        return;
      }
      openModal('add');
    });

    // Click green dots to edit
    grid.addEventListener('click', (e) => {
      const dot = e.target.closest('.grid-dot.has-milestone');
      if (!dot) return;
      const dayIndex = parseInt(dot.dataset.dayIndex);
      const milestoneDayMap = getMilestoneDayMap();
      const milestoneIndices = milestoneDayMap[dayIndex];
      if (milestoneIndices && milestoneIndices.length > 0) {
        openModal('edit', milestoneIndices[0]);
      }
    });

    btnCancel.addEventListener('click', closeModal);

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    function clearErrors() {
      milestoneTitleInput.classList.remove('error');
      calendarEl.classList.remove('error');
      document.querySelectorAll('.modal .error-msg').forEach(el => el.remove());
    }

    function showError(target, message) {
      target.classList.add('error');
      const msg = document.createElement('div');
      msg.className = 'error-msg';
      msg.textContent = message;
      target.parentElement.appendChild(msg);
    }

    milestoneTitleInput.addEventListener('input', clearErrors);

    btnSave.addEventListener('click', () => {
      clearErrors();
      const title = milestoneTitleInput.value.trim();
      const date = selectedDate;
      let hasError = false;

      if (!title) {
        showError(milestoneTitleInput, 'Please enter a title');
        hasError = true;
      }
      if (!date) {
        showError(calendarEl, 'Please pick a date');
        hasError = true;
      }
      if (hasError) return;

      if (editingMilestoneIndex != null) {
        milestones[editingMilestoneIndex] = { title, date };
      } else {
        milestones.push({ title, date });
      }
      localStorage.setItem('milestones', JSON.stringify(milestones));
      renderGrid();
      closeModal();
    });

    btnDelete.addEventListener('click', () => {
      if (editingMilestoneIndex != null) {
        milestones.splice(editingMilestoneIndex, 1);
        localStorage.setItem('milestones', JSON.stringify(milestones));
        renderGrid();
        closeModal();
      }
    });

    milestoneTitleInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnSave.click();
    });

    // Settings logic
    const headerTitleEl = document.querySelector('.header-title');
    const settingsBoardTitle = document.getElementById('settings-board-title');
    const settingsOverlay = document.getElementById('settings-overlay');
    const colorOptions = document.getElementById('color-options');
    const settingsDone = document.getElementById('settings-done');

    let boardTitle = localStorage.getItem('boardTitle') || 'Project friendship';
    headerTitleEl.textContent = boardTitle;

    const accentColors = [
      { name: 'Green',  value: '#4ade80' },
      { name: 'Blue',   value: '#60a5fa' },
      { name: 'Purple', value: '#c084fc' },
      { name: 'Amber',  value: '#fbbf24' },
      { name: 'Rose',   value: '#fb7185' },
      { name: 'Cyan',   value: '#22d3ee' },
    ];

    let currentAccent = localStorage.getItem('accentColor') || '#4ade80';
    document.documentElement.style.setProperty('--accent', currentAccent);

    // Pending settings state (not yet saved)
    let pendingAccent = null;
    let pendingTitle = null;
    let pendingStartDate = null;

    function hasSettingsChanged() {
      const titleChanged = settingsBoardTitle.value.trim() !== boardTitle;
      const colorChanged = pendingAccent !== null && pendingAccent !== currentAccent;
      const startChanged = pendingStartDate !== null && pendingStartDate !== startDateStr;
      return titleChanged || colorChanged || startChanged;
    }

    function updateDoneButton() {
      settingsDone.disabled = !hasSettingsChanged();
    }

    function renderColorOptions() {
      colorOptions.innerHTML = '';
      const displayAccent = pendingAccent || currentAccent;
      accentColors.forEach(c => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch' + (c.value === displayAccent ? ' selected' : '');
        swatch.style.background = c.value;
        swatch.title = c.name;
        swatch.addEventListener('click', () => {
          pendingAccent = c.value;
          renderColorOptions();
          updateDoneButton();
        });
        colorOptions.appendChild(swatch);
      });
    }

    // Settings start-date calendar
    const settingsCalendar = makeCalendar({
      rootEl: document.getElementById('settings-calendar'),
      daysEl: document.getElementById('settings-calendar-days'),
      titleEl: document.getElementById('settings-calendar-title'),
      prevBtn: document.getElementById('settings-cal-prev'),
      nextBtn: document.getElementById('settings-cal-next'),
      getSelectedDate: () => pendingStartDate || startDateStr,
      setSelectedDate: (d) => { pendingStartDate = d; updateDoneButton(); }
    });

    function openSettings() {
      pendingAccent = null;
      pendingTitle = null;
      pendingStartDate = null;
      settingsBoardTitle.value = boardTitle;
      renderColorOptions();
      settingsCalendar.focusDate(startDateStr);
      settingsDone.disabled = true;
      settingsOverlay.classList.add('open');
    }

    function closeSettings() {
      settingsOverlay.classList.remove('open');
      pendingAccent = null;
      pendingTitle = null;
      pendingStartDate = null;
    }

    document.getElementById('btn-settings').addEventListener('click', openSettings);

    settingsBoardTitle.addEventListener('input', updateDoneButton);

    settingsDone.addEventListener('click', () => {
      if (settingsDone.disabled) return;

      // Save title
      const newTitle = settingsBoardTitle.value.trim();
      if (newTitle && newTitle !== boardTitle) {
        boardTitle = newTitle;
        localStorage.setItem('boardTitle', boardTitle);
        headerTitleEl.textContent = boardTitle;
      }

      // Save color
      if (pendingAccent && pendingAccent !== currentAccent) {
        currentAccent = pendingAccent;
        localStorage.setItem('accentColor', currentAccent);
        document.documentElement.style.setProperty('--accent', currentAccent);
      }

      // Save start date
      if (pendingStartDate && pendingStartDate !== startDateStr) {
        startDateStr = pendingStartDate;
        localStorage.setItem('startDate', startDateStr);
        recomputeYearWindow();
        updateHeaderDate();
        renderGrid();
      }

      closeSettings();
    });

    settingsOverlay.addEventListener('click', (e) => {
      if (e.target === settingsOverlay) closeSettings();
    });
  </script>
</body>
</html>
